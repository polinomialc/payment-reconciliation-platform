    <text x="966" y="584" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#202635">BookStack procedure library</text>
    <text x="966" y="612" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#202635">Rules, playbooks, approvals</text>
