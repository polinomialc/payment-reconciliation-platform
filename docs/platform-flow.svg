  <text x="64" y="670" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#667085">Local PoC keeps CSVs as transparent sample inputs. DuckDB validates the SQL locally. The target production pattern moves the same SQL-governed logic to BigQuery with Streamlit, Metabase, and BookStack as consumption and governance layers.</text>
