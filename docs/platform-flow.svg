  <text x="64" y="104" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#667085">Sanitized portfolio architecture: transparent CSV inputs, SQL reconciliation logic, operational workflow, reporting, and governed knowledge management.</text>

